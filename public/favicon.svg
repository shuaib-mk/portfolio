<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <g stroke="#3e2a18" stroke-width="2" stroke-linejoin="round">
    <!-- Left Face (Dirt) -->
    <polygon points="10,35 60,60 60,110 10,85" fill="#785233" />
    <!-- Right Face (Dirt) -->
    <polygon points="60,60 110,35 110,85 60,110" fill="#5a3a21" />
    <!-- Top Face (Grass) -->
    <polygon points="60,10 110,35 60,60 10,35" fill="#5ebd4c" />
    <!-- Grass Overhang Left -->
    <polygon points="10,35 60,60 60,68 50,60 40,68 30,55 20,68 10,60" fill="#5ebd4c" stroke="none"/>
    <!-- Grass Overhang Right -->
    <polygon points="60,60 110,35 110,43 100,35 90,43 80,30 70,43 60,68" fill="#4da03d" stroke="none"/>
  </g>
</svg>